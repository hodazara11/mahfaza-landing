<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعادة كلمة المرور — Mahfaza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/shared-styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">Mahfaza<span class="logo-dot"></span></a>
    <div class="nav-actions">
      <button class="icon-btn" id="langToggle">EN</button>
      <button class="icon-btn" id="themeToggle">☾</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 data-i18n="title">استعادة كلمة المرور</h1>
      <p data-i18n="sub">هنبعتلك رابط لإعادة تعيين كلمة المرور</p>
    </div>

    <div id="alertBox" style="display:none;"></div>

    <div id="requestSection">
      <form id="resetForm">
        <div class="form-field">
          <label data-i18n="email">البريد الإلكتروني</label>
          <input type="email" id="email" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span id="btnText" data-i18n="submit">إرسال رابط الاستعادة</span>
        </button>
      </form>
    </div>

    <div id="updateSection" style="display:none;">
      <form id="updateForm">
        <div class="form-field">
          <label data-i18n="newPassword">كلمة المرور الجديدة</label>
          <input type="password" id="newPassword" required minlength="8" autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary" id="updateBtn">
          <span id="updateBtnText" data-i18n="updateSubmit">تحديث كلمة المرور</span>
        </button>
      </form>
    </div>

    <div class="auth-footer">
      <a href="login.html" data-i18n="backToLogin">← العودة لتسجيل الدخول</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/supabase.js"></script>
<script src="lib/auth.js"></script>
<script src="lib/theme-lang.js"></script>
<script>
const STRINGS = {
  ar: {
    title: 'استعادة كلمة المرور',
    sub: 'هنبعتلك رابط لإعادة تعيين كلمة المرور',
    email: 'البريد الإلكتروني',
    submit: 'إرسال رابط الاستعادة',
    newPassword: 'كلمة المرور الجديدة',
    updateSubmit: 'تحديث كلمة المرور',
    backToLogin: '← العودة لتسجيل الدخول',
    sent: '✅ تم إرسال الرابط على بريدك',
    updated: '✅ تم تحديث كلمة المرور، جاري تحويلك للدخول...',
    errGeneric: 'حدث خطأ، حاول مرة أخرى',
    titleUpdate: 'كلمة مرور جديدة'
  },
  en: {
    title: 'Reset Password',
    sub: 'We\'ll send you a reset link',
    email: 'Email Address',
    submit: 'Send Reset Link',
    newPassword: 'New Password',
    updateSubmit: 'Update Password',
    backToLogin: '← Back to Sign In',
    sent: '✅ Reset link sent to your email',
    updated: '✅ Password updated, redirecting to login...',
    errGeneric: 'Something went wrong, please try again',
    titleUpdate: 'New Password'
  }
};

MahfazaUI.init(STRINGS);

function showAlert(type, message) {
  const box = document.getElementById('alertBox');
  box.className = 'alert alert-' + type;
  box.textContent = message;
  box.style.display = 'flex';
}

function getString(key) {
  const lang = localStorage.getItem('mahfaza_lang') || 'ar';
  return STRINGS[lang][key] || key;
}

// If URL has reset code, show update form
const urlParams = new URLSearchParams(window.location.hash.substring(1));
if (urlParams.get('access_token')) {
  document.getElementById('requestSection').style.display = 'none';
  document.getElementById('updateSection').style.display = 'block';
  document.querySelector('.auth-header h1').textContent = getString('titleUpdate');
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';

  try {
    await MahfazaAuth.requestPasswordReset(document.getElementById('email').value);
    showAlert('success', getString('sent'));
    btn.disabled = true;
    btnText.textContent = getString('sent');
  } catch (error) {
    showAlert('error', getString('errGeneric'));
    btn.disabled = false;
    btnText.textContent = getString('submit');
  }
});

document.getElementById('updateForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('updateBtn');
  const btnText = document.getElementById('updateBtnText');

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';

  try {
    await MahfazaAuth.updatePassword(document.getElementById('newPassword').value);
    showAlert('success', getString('updated'));
    setTimeout(() => { window.location.href = '/login.html'; }, 2000);
  } catch (error) {
    showAlert('error', getString('errGeneric'));
    btn.disabled = false;
    btnText.textContent = getString('updateSubmit');
  }
});
</script>

</body>
</html>
