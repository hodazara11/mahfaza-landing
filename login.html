<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — Mahfaza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/shared-styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">Mahfaza<span class="logo-dot"></span></a>
    <div class="nav-actions">
      <button class="icon-btn" id="langToggle">EN</button>
      <button class="icon-btn" id="themeToggle">☾</button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 data-i18n="title">مرحباً بعودتك</h1>
      <p data-i18n="sub">سجل الدخول لمتابعة إدارة أموالك</p>
    </div>

    <div id="alertBox" style="display:none;"></div>

    <form id="loginForm">
      <div class="form-field">
        <label data-i18n="email">البريد الإلكتروني</label>
        <input type="email" id="email" required autocomplete="email">
      </div>

      <div class="form-field">
        <label data-i18n="password">كلمة المرور</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span id="btnText" data-i18n="submit">تسجيل الدخول</span>
      </button>

      <div style="text-align:center;margin-top:16px;">
        <a href="reset-password.html" style="color:var(--brand);font-size:13px;text-decoration:none;" data-i18n="forgot">نسيت كلمة المرور؟</a>
      </div>
    </form>

    <div class="auth-footer">
      <span data-i18n="noAccount">مش عندك حساب؟</span>
      <a href="signup.html" data-i18n="signupLink">إنشاء حساب جديد</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/supabase.js"></script>
<script src="lib/auth.js"></script>
<script src="lib/theme-lang.js"></script>
<script>
const STRINGS = {
  ar: {
    title: 'مرحباً بعودتك',
    sub: 'سجل الدخول لمتابعة إدارة أموالك',
    email: 'البريد الإلكتروني',
    password: 'كلمة المرور',
    submit: 'تسجيل الدخول',
    forgot: 'نسيت كلمة المرور؟',
    noAccount: 'مش عندك حساب؟',
    signupLink: 'إنشاء حساب جديد',
    errCreds: 'البريد أو كلمة المرور غير صحيحة',
    errGeneric: 'حدث خطأ، حاول مرة أخرى'
  },
  en: {
    title: 'Welcome back',
    sub: 'Sign in to continue managing your money',
    email: 'Email Address',
    password: 'Password',
    submit: 'Sign In',
    forgot: 'Forgot password?',
    noAccount: 'Don\'t have an account?',
    signupLink: 'Create new account',
    errCreds: 'Invalid email or password',
    errGeneric: 'Something went wrong, please try again'
  }
};

MahfazaUI.init(STRINGS);

// If already logged in, route accordingly
setTimeout(async () => {
  const client = window.supabaseClient;
  const { data: { user } } = await client.auth.getUser();
  if (user) {
    const profile = await MahfazaAuth.getProfile(user.id);
    if (profile) {
      const target = await MahfazaAuth.routeByStatus(user);
      window.location.href = target;
    }
  }
}, 100);

function showAlert(type, message) {
  const box = document.getElementById('alertBox');
  box.className = 'alert alert-' + type;
  box.textContent = message;
  box.style.display = 'flex';
}

function getString(key) {
  const lang = localStorage.getItem('mahfaza_lang') || 'ar';
  return STRINGS[lang][key] || key;
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';

  try {
    const data = await MahfazaAuth.login({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    });

    if (data.user) {
      const target = await MahfazaAuth.routeByStatus(data.user);
      window.location.href = target;
    }
  } catch (error) {
    let msg = getString('errGeneric');
    if (error.message.toLowerCase().includes('invalid') || error.message.toLowerCase().includes('credentials')) {
      msg = getString('errCreds');
    }
    showAlert('error', msg);
    btn.disabled = false;
    btnText.textContent = getString('submit');
  }
});
</script>

</body>
</html>
