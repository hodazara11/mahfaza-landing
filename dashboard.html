<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Mahfaza</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/shared-styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="dashboard.html" class="logo">Mahfaza<span class="logo-dot"></span></a>
    <div class="nav-actions">
      <button class="icon-btn" id="langToggle">EN</button>
      <button class="icon-btn" id="themeToggle">☾</button>
      <button class="icon-btn" id="logoutBtn" style="width:auto;padding:0 12px;font-size:12px;">خروج</button>
    </div>
  </div>
</nav>

<div class="container" style="max-width:720px;">
  <div class="auth-card" style="text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🎉</div>
    <h1 style="margin-bottom:8px;">تم تسجيل الدخول بنجاح</h1>
    <p style="color:var(--text-2);margin-bottom:24px;" id="userInfo"></p>
    <p style="color:var(--text-3);font-size:14px;">
      الـ Dashboard الكامل سيكون جاهز في Phase 6.<br>
      دلوقتي بنبني الـ Auth + Activation flow.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lib/supabase.js"></script>
<script src="lib/auth.js"></script>
<script src="lib/theme-lang.js"></script>
<script>
MahfazaUI.init({ ar: {}, en: {} });

setTimeout(async () => {
  const user = await MahfazaAuth.requireAuth();
  if (!user) return;
  const profile = await MahfazaAuth.getProfile(user.id);
  if (!profile) return;
  if (profile.subscription_status === 'pending_activation') {
    window.location.href = '/pending.html';
    return;
  }
  if (profile.subscription_status === 'active' && !profile.onboarding_completed) {
    window.location.href = '/onboarding.html';
    return;
  }

  document.getElementById('userInfo').textContent =
    `${profile.full_name || user.email} • ${profile.order_id}`;

  // Show welcome message if just completed onboarding
  if (localStorage.getItem('mahfaza_show_welcome_tooltips') === '1') {
    localStorage.removeItem('mahfaza_show_welcome_tooltips');
    setTimeout(() => {
      alert((profile.preferred_language === 'en' ? 'Welcome to Mahfaza! 🎉\n\nYour categories are set up. Next: start adding transactions when the full dashboard launches in Phase 6.' : 'أهلاً بك في محفظة! 🎉\n\nالفئات بتاعتك جاهزة. الخطوة الجاية: تبدأ تضيف معاملاتك لما الـ Dashboard الكامل يجهز في Phase 6.'));
    }, 500);
  }

  // Enforce single-session on this protected page
  MahfazaAuth.enforceSingleSession();
}, 100);

document.getElementById('logoutBtn').addEventListener('click', () => MahfazaAuth.logout());
</script>

</body>
</html>
